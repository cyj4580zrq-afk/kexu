name: Android Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: android-app/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Validate version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./android-app/package.json').version")"
          if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version $VERSION does not match package version $PACKAGE_VERSION"
            exit 1
          fi
          if ! grep -q "^## \[$VERSION\]" CHANGELOG.md; then
            echo "CHANGELOG.md is missing version $VERSION"
            exit 1
          fi

      - name: Install dependencies
        working-directory: android-app
        run: npm ci

      - name: Sync Android project
        working-directory: android-app
        run: npx cap sync android

      - name: Build APK
        working-directory: android-app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Prepare release files
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APK_NAME="Kexu-Android-v${VERSION}-debug.apk"
          cp android-app/android/app/build/outputs/apk/debug/app-debug.apk "$APK_NAME"
          awk -v version="$VERSION" '
            $0 == "## [" version "]" { capture=1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          echo "APK_NAME=$APK_NAME" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "$GITHUB_REF_NAME" "$APK_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "课序 v${VERSION}" \
            --notes-file release-notes.md \
            --verify-tag

