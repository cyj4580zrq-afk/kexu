name: Android Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: android-app/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Restore Android signing key
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        shell: bash
        run: |
          for value in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!value}" ]; then
              echo "Required Android signing secret is missing: $value"
              exit 1
            fi
          done
          mkdir -p android-app/release-signing
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android-app/release-signing/kexu-release.jks
          cat > android-app/release-signing/signing.properties <<EOF
          storeFile=../../release-signing/kexu-release.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Validate version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./android-app/package.json').version")"
          if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version $VERSION does not match package version $PACKAGE_VERSION"
            exit 1
          fi
          if ! grep -q "^## \[$VERSION\]" CHANGELOG.md; then
            echo "CHANGELOG.md is missing version $VERSION"
            exit 1
          fi

      - name: Install dependencies
        working-directory: android-app
        run: npm ci

      - name: Sync Android project
        working-directory: android-app
        run: npx cap sync android

      - name: Build signed release APK
        working-directory: android-app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Prepare release files
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APK_NAME="Kexu-Android-v${VERSION}.apk"
          cp android-app/android/app/build/outputs/apk/release/app-release.apk "$APK_NAME"
          awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\]" { capture=1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          echo "APK_NAME=$APK_NAME" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "$GITHUB_REF_NAME" "$APK_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "课序 v${VERSION}" \
            --notes-file release-notes.md \
            --verify-tag
