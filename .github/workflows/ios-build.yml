name: iOS Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "android-app/ios/**"
      - "android-app/www/**"
      - "android-app/package.json"
      - "android-app/package-lock.json"
      - ".github/workflows/ios-build.yml"
  pull_request:
    paths:
      - "android-app/ios/**"
      - "android-app/www/**"
      - "android-app/package.json"
      - "android-app/package-lock.json"
      - ".github/workflows/ios-build.yml"

permissions:
  contents: read

jobs:
  build-unsigned-ipa:
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: android-app/package-lock.json

      - name: Install dependencies
        working-directory: android-app
        run: npm ci

      - name: Sync iOS project
        working-directory: android-app
        run: npm run sync:ios

      - name: Archive unsigned iOS app
        working-directory: android-app/ios
        shell: bash
        run: |
          xcodebuild \
            -project App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/Kexu.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY='' \
            archive

      - name: Package unsigned IPA
        working-directory: android-app/ios
        shell: bash
        run: |
          mkdir -p ipa/Payload
          app_path="$(find build/Kexu.xcarchive/Products/Applications -maxdepth 1 -name '*.app' -print -quit)"
          test -n "$app_path"
          cp -R "$app_path" ipa/Payload/
          ditto -c -k --sequesterRsrc --keepParent ipa Kexu-iOS-unsigned.ipa

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: Kexu-iOS-unsigned-${{ github.run_number }}
          path: android-app/ios/Kexu-iOS-unsigned.ipa
          if-no-files-found: error
          retention-days: 14

  simulator-test:
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: android-app/package-lock.json

      - name: Install dependencies
        working-directory: android-app
        run: npm ci

      - name: Sync iOS project
        working-directory: android-app
        run: npm run sync:ios

      - name: Select iPhone simulator
        shell: bash
        run: |
          python3 - <<'PY' >> "$GITHUB_ENV"
          import json
          import subprocess

          payload = json.loads(subprocess.check_output(
              ["xcrun", "simctl", "list", "devices", "available", "-j"],
              text=True,
          ))
          for runtime in sorted(payload["devices"], reverse=True):
              iphones = [
                  device for device in payload["devices"][runtime]
                  if device.get("isAvailable") and device["name"].startswith("iPhone")
              ]
              if iphones:
                  device = iphones[0]
                  print(f"SIMULATOR_UDID={device['udid']}")
                  print(f"SIMULATOR_NAME={device['name']}")
                  break
          else:
              raise SystemExit("No available iPhone simulator was found")
          PY

      - name: Boot clean simulator
        shell: bash
        run: |
          xcrun simctl shutdown all || true
          xcrun simctl erase "$SIMULATOR_UDID"
          xcrun simctl boot "$SIMULATOR_UDID"
          xcrun simctl bootstatus "$SIMULATOR_UDID" -b
          echo "Running UI tests on $SIMULATOR_NAME ($SIMULATOR_UDID)"

      - name: Run iOS simulator UI tests
        working-directory: android-app/ios
        shell: bash
        run: |
          mkdir -p TestArtifacts
          set -o pipefail
          xcodebuild \
            -project App/App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=$SIMULATOR_UDID" \
            -derivedDataPath DerivedData \
            -resultBundlePath TestArtifacts/AppUITests.xcresult \
            -test-timeouts-enabled YES \
            -default-test-execution-time-allowance 240 \
            -maximum-test-execution-time-allowance 300 \
            CODE_SIGNING_ALLOWED=NO \
            test | tee TestArtifacts/xcodebuild.log

      - name: Collect simulator evidence
        if: always()
        working-directory: android-app/ios
        shell: bash
        run: |
          mkdir -p TestArtifacts/screenshots TestArtifacts/logs
          xcrun simctl io "$SIMULATOR_UDID" screenshot TestArtifacts/screenshots/final-state.png || true
          xcrun simctl spawn "$SIMULATOR_UDID" log show \
            --style compact \
            --last 20m \
            --predicate 'process == "App"' \
            > TestArtifacts/logs/app.log 2>&1 || true
          if [ -d TestArtifacts/AppUITests.xcresult ]; then
            xcrun xcresulttool export attachments \
              --path TestArtifacts/AppUITests.xcresult \
              --output-path TestArtifacts/screenshots \
              || true
          fi
          xcrun simctl list devices | grep "$SIMULATOR_UDID" > TestArtifacts/logs/simulator.txt || true

      - name: Upload simulator screenshots and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-test-${{ github.run_number }}
          path: android-app/ios/TestArtifacts/
          if-no-files-found: error
          retention-days: 14
